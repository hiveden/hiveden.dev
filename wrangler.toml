#:schema node_modules/wrangler/config-schema.json

name = "hiveden-dev"
main = ".open-next/worker.js"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

assets = { directory = ".open-next/assets", binding = "ASSETS" }

# Page view counter storage. Create via:
#   pnpm wrangler kv namespace create VIEWS
#   pnpm wrangler kv namespace create VIEWS --preview
[[kv_namespaces]]
binding = "VIEWS"
id = "b6b4c8e33493407bb665dccf948e4e0d"
preview_id = "36f0f0947cb9453ba2ec7042ac5498a0"
